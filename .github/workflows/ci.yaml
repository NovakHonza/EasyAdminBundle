name: Build
on:
    push:
        branches:
            - "4.x"
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    phpstan:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP, with composer and extensions
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  coverage: none
                  tools: composer:2.8

            - name: Install dependencies
              run: |
                  composer install --no-interaction --no-progress --prefer-dist
                  vendor/bin/simple-phpunit install

            - name: "Run PHPStan analysis"
              run: vendor/bin/phpstan analyse

    phpunit:
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Latest Symfony version support
                    - os: macos-latest
                      php_version: "8.4"
                      symfony_version: "8.0.*"
                      stability: "stable"
                    - os: windows-latest
                      php_version: "8.4"
                      symfony_version: "8.0.*"
                      stability: "stable"
                    # LTS Symfony version support
                    - os: macos-latest
                      php_version: "8.4"
                      symfony_version: "7.4.*"
                      stability: "stable"
                    - os: windows-latest
                      php_version: "8.4"
                      symfony_version: "7.4.*"
                      stability: "stable"
                    # Lowest deps support
                    - os: ubuntu-latest
                      php_version: "8.2"
                      composer_args: "--prefer-lowest"
                      stability: "stable"
                      symfony_deprecations_helper: "disabled"
                    # All supported Symfony versions
                    - os: ubuntu-latest
                      php_version: "8.4"
                      symfony_version: "6.4.*"
                      stability: "stable"
                    - os: ubuntu-latest
                      php_version: "8.4"
                      symfony_version: "7.1.*"
                      stability: "stable"
                      symfony_deprecations_helper: "disabled"
                    - os: ubuntu-latest
                      php_version: "8.4"
                      symfony_version: "7.2.*"
                      stability: "stable"
                    - os: ubuntu-latest
                      php_version: "8.4"
                      symfony_version: "7.3.*"
                      stability: "stable"
                    - os: ubuntu-latest
                      php_version: "8.4"
                      symfony_version: "7.4.*"
                      stability: "stable"
                    - os: ubuntu-latest
                      php_version: "8.4"
                      symfony_version: "8.0.*"
                      stability: "stable"
                    # Upcoming Symfony version
                    - os: ubuntu-latest
                      php_version: "8.5"
                      symfony_version: "8.1.*@dev"
                      stability: "dev"
        runs-on: ${{ matrix.os }}
        continue-on-error: ${{ matrix.stability == 'dev' }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP, with composer and extensions
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php_version }}
                  coverage: none
                  extensions: mbstring, intl, pdo, pdo_sqlite, sqlite3
                  ini-values: date.timezone=UTC
                  tools: composer:2.8

            - name: symfony/flex is required to install the correct symfony version
              if: ${{ matrix.symfony_version }}
              run: |
                  composer global config --no-plugins allow-plugins.symfony/flex true
                  composer global require symfony/flex

            - name: Configure Composer stability
              run: |
                  composer config minimum-stability ${{ matrix.stability }}

            - name: Configure Symfony version for symfony/flex
              if: ${{ matrix.symfony_version }}
              run: composer config extra.symfony.require "${{ matrix.symfony_version }}"

            - name: Install dependencies
              run: |
                  composer update --no-interaction --no-progress --prefer-dist ${{ matrix.composer_args }}
                  vendor/bin/simple-phpunit install

            - name: Show installed dependencies
              run: |
                  composer show

            - name: Run tests
              if: ${{ runner.os != 'Windows' }}
              shell: bash
              run: |
                  make tests
              env:
                  SYMFONY_DEPRECATIONS_HELPER: ${{ matrix.symfony_deprecations_helper || '' }}

            - name: Run tests (Windows)
              if: ${{ runner.os == 'Windows' }}
              run: vendor/bin/simple-phpunit

    php-linter:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            # see https://github.com/OskarStark/php-cs-fixer-ga
            - name: PHP-CS-Fixer
              uses: docker://oskarstark/php-cs-fixer-ga
              with:
                  args: --diff --dry-run

    doc-linter:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - name: DOCtor-RST
              uses: docker://oskarstark/doctor-rst
              with:
                  args: --short
              env:
                  DOCS_DIR: "doc/"

    css-linter:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP, with composer and extensions
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.2
                  coverage: none
                  tools: composer:2.8

            - name: Install dependencies
              run: |
                  composer install --no-interaction --no-progress --prefer-dist

            -   name: Lint logical CSS properties
                run: |
                    php ./src/Resources/bin/logical-css-properties-linter.php

    twig-linter:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP, with composer and extensions
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.2
                  coverage: none
                  tools: composer:2.8

            - name: Install dependencies
              run: |
                  composer install --no-interaction --no-progress --prefer-dist

            -   name: Lint Twig template syntax
                run: |
                    vendor/bin/twig-cs-fixer lint templates/ --report=github

    js-linter:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - run: npm i -g corepack && corepack enable
            - uses: actions/setup-node@v6
              with:
                  cache: 'yarn'
            - run: yarn --immutable
            - run: yarn ci
